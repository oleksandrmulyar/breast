<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Грудні залози — просте меню</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section id="sideSelection" class="selection-view" aria-labelledby="selectionTitle">
      <h1 id="selectionTitle">Оберіть грудну залозу</h1>
      <div class="choice-grid" role="list">
        <button class="choice-card" type="button" data-side="right" role="listitem">
          <img src="right-breast.jpg" alt="Схема правої грудної залози" />
          <span>Права<br />грудна залоза</span>
        </button>
        <button class="choice-card" type="button" data-side="left" role="listitem">
          <img src="left-breast.jpg" alt="Схема лівої грудної залози" />
          <span>Ліва<br />грудна залоза</span>
        </button>
      </div>
    </section>

    <section id="detailView" class="detail-view hidden" aria-labelledby="detailTitle">
      <button id="backToSelection" class="back-button" type="button">← Назад до вибору</button>
      <h1 id="detailTitle" class="sr-only">Меню грудної залози</h1>

      <div class="image-grid">
        <article class="image-card">
          <div class="image-stage">
            <img id="primaryImage" src="right-breast.jpg" alt="Обрана грудна залоза" />
            <div id="lesionOverlay" class="lesion-overlay" aria-live="polite"></div>
          </div>
          <button id="savePrimary" class="save-button" type="button">Зберегти зображення</button>
        </article>
      </div>

      <section class="simple-section" aria-labelledby="massesTitle">
        <div class="section-heading">
          <h2 id="massesTitle">Утвори</h2>
          <button id="addMass" class="round-add" type="button" aria-label="Додати утвір">+</button>
        </div>
        <div id="massesTable" class="table-shell" role="table" aria-label="Таблиця утворів">
          <div class="table-row table-header" role="row">
            <span role="columnheader">№ ураження</span>
            <span role="columnheader">Назва утвору</span>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
